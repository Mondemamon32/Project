<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Motion (Framer Motion for Vanilla JS) -->
    <script src="https://unpkg.com/motion@latest/dist/motion.js"></script>
    <script>
        (function () {
            const savedTheme = localStorage.getItem("theme") || "light";
            document.documentElement.setAttribute("data-bs-theme", savedTheme);
        })();
    </script>
</head>

<body class="bg-body">

    <main class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="row justify-content-center w-100">
            <div class="col-md-5 col-lg-4">
                <div class="custom-card p-4 shadow-sm" id="authCard">
                    <div class="text-center mb-5">
                        <div class="d-inline-flex p-3 bg-primary text-white rounded-circle mb-3">
                            <i data-lucide="check-square" size="32"></i>
                        </div>
                        <h2 class="fw-bold">TaskMaster</h2>
                        <p class="text-secondary">Your minimalistic task manager</p>
                    </div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-secondary text-uppercase">Email address</label>
                            <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-semibold text-secondary text-uppercase">Password</label>
                            <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2" id="loginBtn">
                            <span>Sign In</span>
                            <i data-lucide="arrow-right" size="18"></i>
                        </button>
                        <p class="text-center mt-4 small text-secondary">
                            Don't have an account? <a href="#" id="showRegister" class="text-primary text-decoration-none fw-semibold">Create one</a>
                        </p>
                    </form>

                    <form id="registerForm" class="d-none">
                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-secondary text-uppercase">Full Name</label>
                            <input type="text" class="form-control" id="regName" placeholder="John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-secondary text-uppercase">Email address</label>
                            <input type="email" class="form-control" id="regEmail" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-semibold text-secondary text-uppercase">Password</label>
                            <input type="password" class="form-control" id="regPassword" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2" id="regBtn">
                            <span>Create Account</span>
                            <i data-lucide="user-plus" size="18"></i>
                        </button>
                        <p class="text-center mt-4 small text-secondary">
                            Already have an account? <a href="#" id="showLogin" class="text-primary text-decoration-none fw-semibold">Sign In</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start">
                    <div class="d-flex align-items-center gap-2 justify-content-center justify-content-md-start mb-2">
                        <i data-lucide="check-square" class="text-primary" size="24"></i>
                        <h5 class="fw-bold m-0">TaskMaster</h5>
                    </div>
                    <p class="text-secondary footer-details mb-0">
                        Raymond Bool, Pamela Calma, Alfonso Chua, Norman Gopico <br>
                        Built A.Y. 2025-2026
                    </p>
                </div>
                <div class="col-md-6 text-center text-md-end mt-4 mt-md-0">
                    <div class="d-flex justify-content-center justify-content-md-end align-items-center gap-4">
                        <div class="form-check form-switch p-0 m-0">
                            <input class="form-check-input ms-0" type="checkbox" id="modeToggle">
                            <label class="form-check-label small text-secondary ms-2" for="modeToggle" id="toggleLabel">Light Mode</label>
                        </div>
                        <a href="https://github.com/Mondemamon32/Project" target="_blank" class="text-secondary">
                            <i data-lucide="github" size="20"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
