<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">TaskMaster</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="tasks.html">Tasks</a></li>
                    <li class="nav-item"><a class="nav-link active" href="analytics.html">Analytics</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="index.html" id="logoutBtn">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 fade-in">
        <h2 class="mb-4">Performance Analytics</h2>
        
        <div class="row">
            <div class="col-lg-8">
                <div class="card p-4 shadow-sm mb-4 custom-card">
                    <h4 class="mb-3">Overall Completion Rate</h4>
                    <div class="progress mb-3" style="height: 30px;">
                        <div id="analyticsProgress" class="progress-bar bg-primary progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%">0%</div>
                    </div>
                    <p id="analyticsText" class="text-muted">Loading your progress...</p>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="card p-4 shadow-sm mb-4 custom-card bg-primary text-white text-center">
                    <h5>Current Streak</h5>
                    <h1 id="analyticsStreak" class="display-3 fw-bold">0</h1>
                    <p>Days in a row</p>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-body border-top py-4 mt-5">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start">
                    <h5 class="fw-bold text-primary mb-1">TaskMaster</h5>
                    <p class="text-muted small mb-0">
                        Raymond Bool, Pamela Calma, Alfonso Chua, Norman Gopico <br>
                        Built A.Y. 2025-2026
                    </p>
                </div>
                <div class="col-md-6 text-center text-md-end mt-3 mt-md-0">
                    <div class="d-flex justify-content-center justify-content-md-end align-items-center gap-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="modeToggle">
                            <label class="form-check-label small text-muted" for="modeToggle" id="toggleLabel">Theme: Light</label>
                        </div>
                        <a href="https://github.com/Mondemamon32/Project" target="_blank" class="btn btn-outline-primary btn-sm github-btn-custom">
                            GitHub Repository
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
