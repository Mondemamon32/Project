<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TaskMaster - Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">TaskMaster</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="tasks.html">Tasks</a></li>
                    <li class="nav-item"><a class="nav-link" href="analytics.html">Analytics</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="index.html" id="logoutBtn">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container-fluid my-4">
        <div class="row">
            <aside class="col-md-3 col-lg-2 mb-4">
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-white fw-bold">Filter Courses</div>
                    <ul class="list-group list-group-flush" id="courseFilters">
                        </ul>
                </div>
                
                <div class="card shadow-sm">
                    <div class="card-body p-3">
                        <label class="form-label fw-bold text-muted small mb-1">Add New Course</label>
                        <form id="addCourseForm" class="d-flex gap-2">
                            <input type="text" id="newCourseInput" class="form-control form-control-sm" placeholder="Ex: CS101" required>
                            <button type="submit" class="btn btn-sm btn-primary">+</button>
                        </form>
                    </div>
                </div>
            </aside>

            <main class="col-md-9 col-lg-10">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2>Your Tasks</h2>
                    <div>
                        <div class="btn-group me-2">
                            <button class="btn btn-primary active" id="btnListView">List View</button>
                            <button class="btn btn-outline-primary" id="btnCalView">Calendar View</button>
                        </div>
                        <button class="btn btn-success fw-bold" id="btnOpenAddTask">+ Add Task</button>
                    </div>
                </div>

                <div id="taskContainer" class="row g-4 fade-in">
                    </div>
                
                <div id="calendarContainer" class="d-none border p-4 bg-white shadow-sm rounded fade-in">
                    <div id="calendar"></div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitle">Task Title</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <img id="modalImage" src="" class="img-fluid rounded mb-3 d-none w-100" style="max-height: 200px; object-fit: cover;" alt="Task Image">
                    <p><strong>Course:</strong> <span id="modalCourse" class="badge bg-secondary"></span></p>
                    <p><strong>Deadline:</strong> <span id="modalDateTime"></span></p>
                    <p><strong>Priority:</strong> <span id="modalPriority"></span></p>
                    <p><strong>Status:</strong> <span id="modalStatus"></span></p>
                    <hr>
                    <p><strong>Description:</strong></p>
                    <p id="modalDesc" class="text-break">Details go here...</p>
                </div>
                <div class="modal-footer justify-content-between">
                    <button type="button" class="btn btn-danger" id="btnDeleteTask">Delete</button>
                    <div>
                        <button type="button" class="btn btn-warning" id="btnEditTask">Edit</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="taskFormModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="formModalTitle">Add New Task</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="taskForm">
                    <div class="modal-body">
                        <input type="hidden" id="taskIdInput">
                        <div class="mb-2">
                            <label class="form-label fw-bold">Title</label>
                            <input type="text" class="form-control" id="taskTitleInput" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label fw-bold">Course</label>
                            <select class="form-select" id="taskCourseInput" required>
                                </select>
                        </div>
                        <div class="row mb-2">
                            <div class="col">
                                <label class="form-label fw-bold">Date</label>
                                <input type="date" class="form-control" id="taskDateInput" required>
                            </div>
                            <div class="col">
                                <label class="form-label fw-bold">Time</label>
                                <input type="time" class="form-control" id="taskTimeInput" required>
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="form-label fw-bold">Upload Image (Optional)</label>
                            <input type="file" class="form-control" id="taskImageInput" accept="image/*">
                            <input type="hidden" id="existingImageURL">
                            <small class="text-muted" id="imageHelperText"></small>
                        </div>
                        <div class="row mb-2">
                            <div class="col">
                                <label class="form-label fw-bold">Priority</label>
                                <select class="form-select" id="taskPriorityInput">
                                    <option value="High">High</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="Low">Low</option>
                                </select>
                            </div>
                            <div class="col">
                                <label class="form-label fw-bold">Status</label>
                                <select class="form-select" id="taskStatusInput">
                                    <option value="Pending" selected>Pending</option>
                                    <option value="Completed">Completed</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="form-label fw-bold">Description</label>
                            <textarea class="form-control" id="taskDescInput" rows="3" required></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-success" id="btnSaveTask">Save Task</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
